name = "dripsolve-site"
main = "worker.js"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "dist"
not_found_handling = "404-page"

# Automatic sensor monitoring — poll Tuya for every user's devices every 10 minutes.
[triggers]
crons = ["*/10 * * * *"]

[[d1_databases]]
binding = "DB"
database_name = "dripsolve-db"
database_id = "a2bae2de-21c3-482f-8026-951a10096be7"

# Secrets are NOT stored here (they end up in git history). Set them with:
#   wrangler secret put JWT_SECRET
#   wrangler secret put TUYA_CLIENT_ID
#   wrangler secret put TUYA_CLIENT_SECRET
#   wrangler secret put TUYA_APP_CLIENT_ID
#   wrangler secret put TUYA_APP_CLIENT_SECRET
# For local `wrangler dev`, put them in .dev.vars (gitignored). See .dev.vars.example.
